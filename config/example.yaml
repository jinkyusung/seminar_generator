schema_version: 1.0

deck:
    output_name: paper_seminar_draft
    language: ko
    eod_title: EOD

cover:
    title: 논문 제목
    subtitle: 학회 연도 [link]
    date: 발표일
    venue: RS Team Seminar

sections:
    - id: sec_motivation
      title: Motivation
      contents:
          - motivation_problem
          - motivation_contribution

    - id: sec_preliminaries
      title: Preliminaries
      contents:
          - preliminaries_background
          - preliminaries_problem_setting

    - id: sec_methodology
      title: Methodology
      contents:
          - methodology_overview
          - methodology_1
          - methodology_2

    - id: sec_analysis
      title: Analysis
      contents:
          - analysis_key_argument
          - analysis_theoretical_or_empirical_insight

    - id: sec_experiments
      title: Experiments
      contents:
          - experiments_setup
          - experiments_results
          - experiments_ablation
          - experiments_hyperparameters
          - experiments_additional

main:
    - id: motivation_problem
      title: 기존 연구의 한계
      body: |
          이 슬라이드는 저자들이 기존 연구에서 충분히 해결되지 않았다고 보는 지점을 정리한다.
          관련 연구나 서론에서 반복적으로 언급되는 한계, 미해결 문제, 기존 방법의 제약을 중심으로 설명한다.
          가능하면 기존 접근들이 어떤 가정을 공유하고 있으며, 논문이 그 가정을 어떻게 문제 삼는지를 드러낸다.

    - id: motivation_contribution
      title: 논문의 핵심 기여
      body: |
          이 슬라이드는 논문의 주요 기여를 발표자가 이해한 방식으로 재구성한다.
          저자들이 명시적으로 제시한 contribution을 그대로 나열하기보다, 연구 문제에 대한 답변으로서 각 기여가 어떤 역할을 하는지 설명한다.
          방법론적 기여, 이론적 기여, 실험적 검증, 데이터셋 또는 시스템 기여가 있다면 각각의 의미를 간결하게 연결한다.

    - id: preliminaries_background
      title: 배경 개념
      body: |
          이 슬라이드는 논문을 이해하기 위해 필요한 핵심 배경 개념을 설명한다.
          발표 청중이 논문의 세부 방법을 따라가기 위해 반드시 알아야 하는 용어, 모델, 알고리즘, 이론적 전제를 선별한다.
          모든 배경 지식을 포괄적으로 설명하지 말고, 이후 방법론과 분석을 이해하는 데 직접 필요한 개념만 포함한다.

    - id: preliminaries_problem_setting
      title: 문제 설정
      body: |
          이 슬라이드는 논문에서 정의하는 문제 설정을 정리한다.
          입력, 출력, 목적 함수, 주요 변수, 제약 조건, 평가 대상이 무엇인지 논문에 근거해 설명한다.
          수식이 중요한 논문이라면 핵심 수식의 의미를 자연어로 풀어 쓰고, 수식 자체는 발표 흐름상 꼭 필요한 경우에만 포함한다.

    - id: methodology_overview
      title: 방법론 개요
      body: |
          이 슬라이드는 논문이 제안하는 방법의 전체 구조를 설명한다.
          세부 구현보다 먼저, 방법이 어떤 입력을 받아 어떤 과정을 거쳐 어떤 결과를 산출하는지 큰 흐름을 제시한다.
          발표자가 청중에게 전달해야 할 핵심은 방법의 구성 요소가 아니라, 왜 이런 구조가 연구 문제를 해결하는 데 적합한지이다.

    - id: methodology_1
      title: 방법론1
      body: |
          이 슬라이드는 논문의 방법론을 설명한다.
          논문에서 제안하는 새로운 모듈, 알고리즘, 학습 방식, 추론 절차, 데이터 구성 방식 중 가장 중요한 부분을 중심으로 정리한다.
          기존 접근과 비교했을 때 무엇이 달라졌고, 그 차이가 어떤 효과를 기대하게 하는지 논리적으로 서술한다.

    - id: methodology_2
      title: 방법론2
      body: |
          이 슬라이드는 논문의 방법론을 설명한다.
          논문에서 제안하는 새로운 모듈, 알고리즘, 학습 방식, 추론 절차, 데이터 구성 방식 중 가장 중요한 부분을 중심으로 정리한다.
          기존 접근과 비교했을 때 무엇이 달라졌고, 그 차이가 어떤 효과를 기대하게 하는지 논리적으로 서술한다.

    - id: analysis_key_argument
      title: 핵심 분석
      body: |
          이 슬라이드는 논문이 제시하는 핵심 분석 또는 논증을 설명한다.
          방법론 자체의 설명을 반복하지 말고, 저자들이 왜 이 방법이 효과적이라고 주장하는지, 그 주장을 어떤 근거로 뒷받침하는지 정리한다.
          이론적 분석, 사례 분석, 오류 분석, 정성적 분석 중 논문에서 가장 중요한 부분을 중심으로 서술한다.

    - id: analysis_theoretical_or_empirical_insight
      title: 주요 인사이트
      body: |
          이 슬라이드는 논문을 통해 얻을 수 있는 중요한 해석적 인사이트를 정리한다.
          실험 결과나 분석 결과가 단순히 성능 향상을 보여주는 데 그치지 않고, 연구 대상이나 방법론에 대해 무엇을 새롭게 이해하게 하는지 설명한다.
          발표자는 여기서 논문의 결과를 더 넓은 연구 맥락과 연결해 해석한다.

    - id: experiments_setup
      title: 실험 설계
      body: |
          이 슬라이드는 논문의 실험 설정을 설명한다.
          사용한 데이터셋, 비교 대상, 평가 지표, 실험 조건, 구현상 중요한 세부 사항을 정리한다.
          모든 세부 설정을 나열하지 말고, 결과 해석에 영향을 주는 요소를 중심으로 설명한다.

    - id: experiments_results
      title: 주요 실험 결과
      body: |
          이 슬라이드는 논문의 핵심 실험 결과를 정리한다.
          주요 테이블이나 그래프에서 확인되는 성능 차이, 저자들이 강조하는 결과, 기존 방법 대비 개선점을 중심으로 설명한다.
          수치가 중요한 경우에는 가장 대표적인 지표와 비교 결과를 포함하되, 발표 흐름을 해치지 않도록 해석을 함께 제공한다.

    - id: experiments_ablation
      title: Ablation Study
      body: |
          이 슬라이드는 ablation study, sensitivity analysis, robustness check, case study 등 추가 실험을 정리한다.
          각 추가 실험이 단순한 부가 결과가 아니라, 방법론의 어떤 구성 요소나 가정을 검증하는지 설명한다.
          ablation 결과가 있다면 어떤 요소가 성능에 가장 크게 기여하는지, 또는 예상과 다른 결과가 있는지 해석한다.

    - id: experiments_hyperparameters
      title: Hyperparameter Study
      body: |
          이 슬라이드는 모델 학습 및 평가에 사용된 주요 하이퍼파라미터와 실험 조건을 정리한다.
          learning rate, batch size, optimizer, epoch 수, 모델 크기, 입력 길이, random seed 등 결과 재현성과 해석에 중요한 설정을 중심으로 설명한다.
          하이퍼파라미터 선택이 성능에 미친 영향이나 저자들이 별도로 보고한 민감도 분석 결과가 있다면, 주요 실험 결과와 연결해 해석한다.

    - id: experiments_additional
      title: Additional Experiments
      body: |
          이 슬라이드는 본문에서 다루지 못한 추가 실험 결과를 정리한다.
          보조 데이터셋, 다른 평가 설정, 추가 baseline 비교, qualitative example, 실패 사례 등 논문의 주장을 보완하는 결과를 중심으로 설명한다.
          각 추가 실험이 핵심 방법론의 일반성, 안정성, 한계 또는 실제 적용 가능성을 어떻게 보여주는지 해석한다.
