main:
    - id: motivation_signed_graph_problem
      title: 'Why Signed Graphs Are Hard'
      body: |
          Signed graph는 edge가 positive 또는 negative sign을 갖는 graph임.
          Link sign prediction은 존재하는 edge의 미관측 sign을 예측하는 문제임.
          Negative edge는 인접 노드가 유사하다는 homophily 가정을 깨뜨림.
          따라서 일반 GNN을 signed graph에 직접 적용하기 어려움.
          논문은 node similarity보다 edge sign 간 의존성에 초점을 옮김.

    - id: motivation_limits_of_sgnn
      title: 'Limits of Existing SGNNs'
      body: |
          기존 SGNN은 negative edge 처리를 위해 auxiliary structure를 추가하는 경향이 있음.
          Balance theory, status theory, sign-specific aggregation 등이 대표적 접근임.
          이런 구조는 convergence를 느리게 하거나 memory 사용을 크게 만들 수 있음.
          Positive edge와 negative edge를 분리해 다루면서 edge 간 통계적 의존성은 직접 모델링하지 못함.
          논문은 이 한계를 inter-edge correlation modeling으로 해결하려 함.

    - id: motivation_edge_dependency_view
      title: 'Edge-Centric Dependency View'
      body: |
          논문의 핵심 가정은 인접 edge들이 informationally independent하지 않다는 점임.
          공통 노드를 공유하는 edge들은 서로 같은 방향이거나 반대 방향의 정보를 가질 수 있음.
          이 관점은 signed graph에서 node homophily를 요구하지 않음.
          Link sign prediction의 대상이 edge sign이므로 edge-centric formulation이 자연스러움.
          CopulaLSP는 Gaussian copula를 통해 edge label들의 joint distribution을 구성함.

    - id: background_link_sign_prediction
      title: 'Problem Setting'
      body: |
          입력 graph는 signed graph $G=(V,E)$이며 edge sign은 positive 또는 negative임.
          Edge set은 observed edge $E_{obs}$와 missing edge $E_{miss}$로 분할됨.
          Observed edge의 sign label은 알려져 있고 missing edge의 sign은 예측 대상임.
          논문은 regular link prediction이 아니라 존재하는 edge의 sign을 맞추는 semi-supervised setting을 사용함.
          전체 edge 수를 $n$, observed edge 수를 $m$으로 두고 observed edge를 앞쪽 index로 정렬함.

    - id: background_gaussian_copula
      title: 'Gaussian Copula for Dependencies'
      body: |
          Copula는 marginal distribution과 dependency structure를 분리해 joint distribution을 표현함.
          Sklar's theorem에 따라 multivariate CDF는 marginals와 copula function으로 분해 가능함.
          Gaussian copula는 correlation matrix $R$을 통해 변수 간 dependency를 모델링함.
          기존 CopulaGNN은 node regression에서 inter-node correlation을 학습했음.
          본 논문은 이를 link sign prediction을 위한 inter-edge correlation으로 확장함.

    - id: background_continuous_edge_labels
      title: 'Relaxed Bernoulli Marginals'
      body: |
          Edge sign은 본래 binary label이지만 Gaussian copula density 계산에는 continuous variable이 필요함.
          논문은 Bernoulli label을 relaxed Bernoulli distribution으로 연속 완화함.
          Location parameter $a$는 edge sign 방향을 나타내며 $a>1$이면 positive로 해석됨.
          Temperature parameter $t$는 sign confidence를 나타내며 1에 가까울수록 확신이 강함.
          Figure 2는 marginal confidence와 copula-based joint PDF의 의미를 시각화함.

    - id: method_overall_pipeline
      title: 'Overall Pipeline'
      body: |
          Figure 1은 CopulaLSP의 training과 inference 전체 구조를 보여줌.
          먼저 signed graph encoder가 node embedding을 생성함.
          두 노드 embedding의 element-wise product로 edge embedding $Q$를 구성함.
          Edge embedding에서 relaxed Bernoulli marginal parameter와 correlation matrix를 동시에 생성함.
          Gaussian copula는 이 둘을 결합해 전체 edge label joint distribution을 정의함.

    - id: method_gramian_correlation
      title: 'Gramian Edge Correlation'
      body: |
          Naive edge-edge correlation matrix는 $n \times n$ 크기라 edge 수가 커질수록 비현실적임.
          논문은 correlation matrix를 edge embedding Gramian에서 유도함.
          Eq. (8)은 covariance를 $QQ^\top + \epsilon I_n$으로 만들고 이를 correlation matrix로 normalize함.
          이 구조는 positive definiteness를 보장하면서 learnable parameter 수를 크게 줄임.
          Edge embedding dimension $d$가 $n$보다 훨씬 작다는 점이 scalability의 핵심임.

    - id: method_marginal_parameterization
      title: 'Marginal Parameters from Edge Embeddings'
      body: |
          각 edge의 relaxed Bernoulli parameter는 edge embedding의 linear projection으로 계산됨.
          Eq. (10)은 $a=\exp(Qw_1)$과 $t=\mathrm{sigmoid}(Qw_2)$를 사용함.
          Exponential은 $a \in (0,\infty)$ 조건을 만족시키기 위한 선택임.
          Sigmoid는 $t \in (0,1)$ 조건을 만족시키며 실험적으로도 가장 좋은 선택으로 보고됨.
          따라서 edge embedding 하나가 marginal sign score와 correlation structure를 함께 제공함.

    - id: method_training_objective
      title: 'Maximum Likelihood Training'
      body: |
          Training은 observed edge label의 negative log-likelihood를 최소화하는 방식임.
          Label이 0 또는 1 boundary에 있으면 relaxed Bernoulli PDF와 CDF가 학습에 불리함.
          논문은 label smoothing으로 negative label을 $\eta$, positive label을 $1-\eta$에 매핑함.
          Eq. (13)의 loss는 Gaussian copula density와 marginal density를 함께 포함함.
          학습은 observed submatrix $R_{00}$에 기반하지만 encoder를 통해 missing edge에도 일반화됨.

    - id: method_efficient_inference
      title: 'Woodbury Reformulation for Inference'
      body: |
          Direct inference는 observed label이 주어진 조건부 Gaussian에서 missing edge latent variable을 sampling함.
          Naive 방식은 $R_{00}^{-1}$ 계산이 필요해 큰 graph에서 시간과 memory 병목이 발생함.
          Eq. (16)은 Gramian correlation을 $PP^\top + K$ 형태로 분해함.
          Woodbury identity를 적용하면 큰 $m \times m$ matrix inversion이 작은 $d \times d$ inversion으로 바뀜.
          Eq. (20)은 이 reformulation을 통해 low-rank multivariate Gaussian inference를 가능하게 함.

    - id: theory_linear_convergence_claim
      title: 'Linear Convergence Claim'
      body: |
          논문은 CopulaLSP loss가 linear convergence를 만족한다고 이론적으로 분석함.
          Linear convergence는 optimization error가 매 step마다 일정 비율로 감소함을 의미함.
          Eq. (22)는 $L_K-L^*$가 $r^K(L_0-L^*)$로 감소함을 나타냄.
          $r$이 작을수록 convergence가 빠르며 이는 빠른 training time으로 이어짐.
          이론 분석은 inter-edge correlation modeling이 빠른 수렴의 핵심 원인이라는 주장을 뒷받침함.

    - id: theory_role_of_design_choices
      title: 'Why the Design Enables the Proof'
      body: |
          논문은 loss가 L-smoothness와 PL condition을 만족함을 보여 linear convergence를 주장함.
          Gramian structure는 correlation matrix의 positive definiteness와 eigenvalue bound에 중요함.
          Label smoothing은 latent variable norm을 제한해 convergence rate bound를 낮추는 역할을 함.
          따라서 scalability 장치와 학습 안정화 장치가 이론 분석에도 직접 연결됨.
          Appendix E에 formal definition과 proof가 제시됨.

    - id: experiments_setup
      title: 'Experimental Setup'
      body: |
          실험은 BitcoinAlpha, BitcoinOTC, WikiElec, WikiRfa, SlashDot, Epinions에서 수행됨.
          Baseline은 GCN, SGCN, SNEA, SDGNN, TrustSGCN, SLGNN, SE-SGformer, SGAAE를 포함함.
          주요 평가 지표는 AUC와 Macro F1임.
          모든 결과는 10개 data split 평균으로 보고됨.
          Backbone encoder는 scalability를 고려해 SNEA를 기본으로 사용함.

    - id: experiments_speed_against_backbone
      title: 'Speedup over SNEA Backbone'
      body: |
          Table 1은 SNEA backbone과 CopulaLSP의 성능 및 scalability를 직접 비교함.
          CopulaLSP는 모든 dataset에서 훨씬 적은 epoch으로 수렴함.
          Training total time은 dataset에 따라 44배에서 379배까지 단축됨.
          Inference time도 16배에서 29배까지 단축됨.
          GPU memory는 SNEA보다 약간 증가하지만 graph size에 비례하지 않는 고정성 overhead로 해석됨.

    - id: experiments_overall_performance
      title: 'Overall Performance and Scalability'
      body: |
          Table 2에서 CopulaLSP는 대부분 baseline과 경쟁적인 AUC 및 F1을 보임.
          Epinions에서는 AUC 0.899와 F1 0.810으로 보고됨.
          SlashDot과 Epinions에서 여러 최신 baseline은 OOM으로 실패함.
          CopulaLSP는 두 대규모 dataset에서도 정상적으로 동작함.
          Table 3과 Appendix scalability 결과는 성능보다 효율성이 핵심 장점임을 보여줌.

    - id: experiments_ablation_correlation
      title: 'Ablation on Gramian Correlation'
      body: |
          Table 4는 correlation matrix를 identity로 고정한 경우와 Gramian correlation을 학습한 경우를 비교함.
          Gramian correlation은 대부분 dataset에서 F1을 개선함.
          BitcoinAlpha에서는 F1이 0.665에서 0.713으로 상승함.
          Epinions에서는 F1이 0.782에서 0.810으로 상승함.
          Wiki dataset을 제외하면 convergence epoch도 대체로 감소함.

    - id: experiments_ablation_woodbury
      title: 'Ablation on Woodbury Reformulation'
      body: |
          Table 5는 Woodbury reformulation의 inference 효율성을 검증함.
          Reformulation 없이 직접 inversion을 수행하면 WikiElec 이상 규모에서 OOM이 발생함.
          Woodbury 사용 시 모든 dataset에서 inference가 가능함.
          BitcoinOTC에서는 inference time이 0.64초에서 0.07초로 감소함.
          Performance degradation은 거의 관찰되지 않아 효율성 개선이 핵심 효과로 해석됨.

    - id: experiments_hyperparameter_sensitivity
      title: 'Hyperparameter Sensitivity'
      body: |
          Figure 3은 label smoothing parameter $\eta$가 클수록 convergence가 빨라지는 경향을 보임.
          Figure 4는 넓은 $\eta$ 범위에서 AUC와 Macro F1이 비교적 안정적임을 보임.
          Appendix F.1은 embedding size와 $\epsilon$에 대한 추가 sensitivity 결과를 제시함.
          $\epsilon$ 변화에 대해 성능은 대체로 안정적이며 convergence trend는 명확하지 않음.
          Table II는 dataset별 best $\epsilon$과 $\eta$를 보고함.

    - id: discussion_takeaways
      title: 'Main Takeaways'
      body: |
          CopulaLSP는 signed graph link sign prediction을 edge label joint distribution modeling 문제로 재구성함.
          Gaussian copula는 marginal sign uncertainty와 inter-edge dependency를 분리해 결합함.
          Gramian correlation은 직접 edge-edge dependency modeling을 가능하게 하면서 memory cost를 낮춤.
          Woodbury reformulation은 inference 단계의 matrix inversion 병목을 제거함.
          결과적으로 competitive prediction performance와 빠른 convergence를 동시에 달성함.

    - id: discussion_limitations
      title: 'Limitations and Future Directions'
      body: |
          논문은 static graph structure를 가정함.
          이는 semi-supervised graph learning setting에 내재된 가정으로 설명됨.
          Dynamic graph와 bipartite graph에 대한 적용은 본문에서 future direction으로 제시됨.
          Social recommendation system 같은 환경에서는 edge sign과 graph structure가 시간에 따라 변할 수 있음.
          따라서 temporal dependency와 inter-edge correlation을 함께 모델링하는 확장이 필요해 보임.
