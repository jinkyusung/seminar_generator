main:
    - id: neural_ode_regularization_gap
      title: Regularization Gap in Neural ODE
      body: |
          Neural ODE는 ResNet을 연속 시간 동역학으로 해석한 모델임.
          메모리 효율성과 파라미터 효율성에서 장점이 있다고 설명됨.
          하지만 기존 discrete network의 dropout과 noise injection을 직접 넣기 어려움.
          논문은 deterministic ODE 구조가 regularization 측면에서 비어 있다고 봄.

    - id: noise_injection_as_missing_component
      title: Why Stochastic Noise Matters
      body: |
          Dropout과 Gaussian noise는 discrete network에서 일반화와 강건성 개선에 사용됨.
          특히 adversarial attack에 대한 robustness 개선에도 noise injection이 활용됨.
          Neural ODE는 deterministic system이므로 이러한 기법을 자연스럽게 포함하지 못함.
          저자들은 continuous network에도 stochastic regularization을 넣는 문제를 제기함.

    - id: paper_contributions
      title: Main Contributions
      body: |
          Neural SDE라는 continuous stochastic neural network framework를 제안함.
          Gaussian noise, multiplicative noise, dropout류 noise를 diffusion term으로 통합함.
          SDE를 통과하는 gradient 계산을 위한 pathwise estimator를 제시함.
          stochastic stability 분석으로 입력 perturbation 억제 가능성을 설명함.
          CIFAR-10, STL-10, Tiny-ImageNet에서 일반화와 강건성 실험을 수행함.

    - id: resnet_to_neural_ode
      title: From ResNet Blocks to Neural ODE
      body: |
          ResNet block은 hidden state에 residual transform을 더하는 이산적 갱신임.
          Neural ODE는 이 갱신을 연속 시간 적분으로 근사함.
          hidden state는 drift function에 의해 시간에 따라 진화함.
          ODE solver가 초기 상태에서 최종 상태까지의 trajectory를 계산함.
          이 구조는 기본적으로 같은 입력에는 같은 trajectory를 반환하는 결정론적 시스템임.

    - id: stochastic_differential_equation_view
      title: SDE View of Continuous Networks
      body: |
          SDE는 drift term과 diffusion term을 함께 갖는 stochastic dynamics임.
          drift는 Neural ODE의 deterministic feature evolution을 담당함.
          diffusion은 Brownian motion을 통해 hidden state에 randomness를 주입함.
          저자들은 이 diffusion term이 continuous network의 regularizer로 작동한다고 해석함.
          Figure 1의 toy example은 충분한 noise가 불안정한 ODE trajectory를 안정화할 수 있음을 보여줌.

    - id: neural_sde_formulation
      title: Neural SDE Formulation
      body: |
          핵심 모델은 Eq. (3)의 SDE dynamics로 정의됨.
          hidden state 변화는 drift $f(h_t,t;w)$와 diffusion $G(h_t,t;v)$의 합으로 표현됨.
          $B_t$는 Brownian motion이며 stochastic noise source 역할을 함.
          Neural ODE는 diffusion term이 0인 특수한 경우로 볼 수 있음.
          논문은 randomness를 drop in component처럼 continuous network에 넣는 구조를 제안함.

    - id: diffusion_choices
      title: Diffusion Choices for Noise Injection
      body: |
          Additive noise는 hidden state와 독립적인 diagonal diffusion으로 표현됨.
          Multiplicative noise는 hidden state에 비례하는 diffusion으로 표현됨.
          Dropout noise는 drift output에 비례하는 diffusion으로 표현됨.
          세 경우 모두 기존 discrete network의 noise injection을 continuous approximation으로 해석함.
          실험에서는 Neural ODE, additive, multiplicative, dropout diffusion을 비교함.

    - id: dropout_as_continuous_noise
      title: Dropout as Continuous Diffusion
      body: |
          논문은 dropout을 Bernoulli noise가 곱해진 residual update로 출발해 설명함.
          Bernoulli noise의 평균과 분산을 맞추면 Gaussian 근사로 바꿀 수 있음.
          이 근사를 통해 dropout은 drift에 비례하는 stochastic diffusion term이 됨.
          최종적으로 Eq. (8)은 dropout류 regularization을 SDE 안에 넣는 형태임.
          이 관점은 dropout을 단순 layer가 아니라 continuous stochastic dynamics로 해석함.

    - id: model_architecture
      title: Model Architecture
      body: |
          Figure 2는 실험에 사용한 전체 architecture를 보여줌.
          입력은 먼저 convolution block을 거쳐 SDE의 initial value가 됨.
          Neural SDE block이 대부분의 trainable dynamics를 담당함.
          최종 time T의 hidden state는 average pooling과 linear classifier로 전달됨.
          ODE와 SDE가 dimension preserving이라는 점 때문에 앞뒤 block이 차원 조정을 맡음.

    - id: pathwise_gradient_training
      title: Training Through SDE Solvers
      body: |
          SDE solver를 autograd로 그대로 역전파하면 discretization step 수만큼 memory가 증가함.
          저자들은 expected loss에 대한 unbiased pathwise gradient estimator를 사용함.
          gradient variable $\beta_t$도 별도의 SDE를 따른다는 Theorem 3.1을 제시함.
          원래 hidden state SDE와 gradient SDE를 함께 풀어 중간 상태 저장을 줄임.
          이 방식은 논문에서 O(1) memory로 설명되며 Neural ODE의 adjoint idea와 유사함.

    - id: perturbation_dynamics
      title: Perturbation Dynamics
      body: |
          이론 분석은 입력이 조금 바뀌었을 때 hidden trajectory 차이가 어떻게 진화하는지 봄.
          원래 초기값 $h_0$와 perturbed 초기값 $h_0+\epsilon_0$를 비교함.
          두 process가 같은 Brownian path를 공유한다고 두고 차이 dynamics를 유도함.
          perturbation $\epsilon_t$는 drift 차이와 diffusion 차이로 구성된 새로운 SDE를 따름.
          이 설정은 output 변화가 시간이 지나며 증폭되는지 또는 억제되는지를 분석하기 위함임.

    - id: lyapunov_stability_argument
      title: Stochastic Lyapunov Stability
      body: |
          저자들은 drift와 diffusion에 linear growth와 Lipschitz 조건을 둠.
          이 조건에서 SDE solution의 존재성과 유일성이 확보된다고 설명함.
          Theorem 3.2는 Lyapunov function 조건이 만족되면 almost surely exponential stability가 가능함을 제시함.
          핵심 메시지는 diffusion term을 적절히 설계하면 perturbation trajectory를 안정화할 수 있다는 것임.
          이 분석은 noise injection이 adversarial robustness에 도움이 되는 이유를 이론적으로 뒷받침함.

    - id: multiplicative_noise_condition
      title: Stability from Multiplicative Noise
      body: |
          특수 사례로 diffusion이 hidden state에 비례하는 multiplicative noise를 분석함.
          drift function이 hidden state에 대해 L Lipschitz라고 가정함.
          안정성 corollary는 $\sigma^2 > 2L$이면 zero perturbation solution이 almost surely exponentially stable함을 보임.
          이는 noise scale이 충분하면 작은 입력 변화가 시간이 지나며 줄어들 수 있음을 의미함.
          단 실제 network에서는 너무 큰 noise가 유용한 feature도 제거할 수 있어 실험적 조정이 필요함.

    - id: experimental_setup
      title: Experimental Setup
      body: |
          실험은 generalization, non adversarial robustness, adversarial robustness를 나누어 평가함.
          데이터셋은 CIFAR-10, STL-10, Tiny-ImageNet을 사용함.
          drift function은 여러 convolution block으로 구성된 neural network로 설정됨.
          diffusion은 ODE, additive, multiplicative, dropout 선택지를 비교함.
          testing time noise를 유지하고 여러 forward propagation 평균을 내는 TTN 설정도 평가함.

    - id: generalization_results
      title: Generalization Results
      body: |
          Table 1에서 Neural SDE는 모든 데이터셋에서 Neural ODE보다 높은 test accuracy를 보임.
          CIFAR-10에서는 ODE 81.63에서 dropout plus TTN 84.55로 개선됨.
          STL-10에서는 ODE 58.03 대비 SDE variants가 60 이상 성능을 보임.
          Tiny-ImageNet에서는 ODE 45.19 대비 dropout plus TTN 47.81이 가장 높음.
          저자들은 작은 noise가 training time regularizer로 작동하고 TTN ensemble이 추가 이득을 준다고 해석함.

    - id: common_corruption_robustness
      title: Robustness to Common Corruptions
      body: |
          Table 2는 clean data로 학습한 모델을 corrupted data에서 평가함.
          CIFAR10-C에서는 모든 corruption level에서 Dropout plus TTN이 ODE보다 높음.
          Level 1에서는 75.89에서 79.07로, Level 5에서는 53.02에서 55.99로 개선됨.
          TinyImageNet-C에서는 5개 level 중 3개에서 Dropout plus TTN이 ODE보다 높음.
          논문은 전체 10개 case 중 8개에서 Neural SDE가 더 좋거나 나머지도 근접하다고 설명함.

    - id: adversarial_robustness
      title: Adversarial Robustness
      body: |
          Figure 3은 adversarial perturbation 크기에 따른 accuracy 감소를 비교함.
          Neural SDE의 multiplicative noise와 dropout noise가 ODE보다 더 높은 accuracy를 유지함.
          세 데이터셋 모두에서 dropout noise가 multiplicative noise보다 더 강한 경향을 보임.
          본문은 multi step PGD attack을 사용했다고 설명함.
          figure caption의 norm 표기와 본문 attack 설명은 완전히 동일하게 정리되어 있지는 않음.

    - id: hidden_state_perturbation
      title: Hidden State Perturbation Analysis
      body: |
          Figure 4는 CIFAR-10 입력에 PGD perturbation을 만든 뒤 hidden state 차이를 추적함.
          상대 perturbation은 network depth가 증가할수록 ODE에서 더 빠르게 누적됨.
          dropout style diffusion을 넣은 SDE에서는 error accumulation이 더 느림.
          이 결과는 theoretical stability argument와 같은 방향의 empirical evidence로 해석됨.
          다만 단일 시각화이므로 일반적인 정량 검증이라기보다 보조 분석에 가까움.

    - id: overall_takeaways
      title: Overall Takeaways
      body: |
          논문의 핵심은 Neural ODE의 deterministic dynamics에 stochastic regularization을 넣는 것임.
          SDE formulation은 여러 noise injection 기법을 하나의 diffusion term으로 통합함.
          이론적으로는 perturbation dynamics의 stochastic stability를 통해 robustness를 설명함.
          실험적으로는 일반화 성능, common corruption, adversarial attack에서 ODE 대비 개선을 보임.
          Neural SDE는 continuous depth model에 regularization을 결합하는 초기 framework로 볼 수 있음.

    - id: limitations_and_scope
      title: Limitations and Scope
      body: |
          diffusion choice와 noise scale 선택은 성능과 feature 보존 사이의 trade off를 가짐.
          본문 기준으로는 convolution image classification 중심의 실험으로 범위가 제한됨.
          너무 큰 noise가 유용한 feature를 제거할 수 있다는 점은 저자들도 언급함.
          TTN은 여러 forward propagation 평균을 사용하므로 inference cost 증가 가능성이 있음.
          adversarial evaluation의 세부 norm 표기는 본문과 figure caption 사이에서 제한적으로만 확인됨.
