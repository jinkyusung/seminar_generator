main:
    - id: motivation_sde_transition_problem
      title: 'Arbitrary-Time Transition Laws'
      body: |
          SDE는 noisy하거나 irregularly sampled time series를 모델링하는 데 적합함.
          실제 응용에서는 임의의 두 시점 사이 전이분포 $p(x_t | x_s)$가 필요함.
          로봇, trading algorithm, digital twin처럼 실시간 예측이 필요한 설정에서 중요함.
          핵심 문제는 임의 시간 간격의 확률적 미래 상태를 빠르고 정확하게 샘플링하는 것임.

    - id: motivation_limits_of_solver_based_models
      title: 'Cost of Numerical Solvers'
      body: |
          기존 neural SDE와 latent SDE는 drift와 diffusion을 학습한 뒤 numerical solver로 trajectory를 적분함.
          시간 간격 $t - s$가 길어질수록 작은 step을 많이 사용해야 하므로 계산량이 증가함.
          Solver는 sample trajectory를 만들 수 있지만 transition density를 직접 제공하지 않음.
          Arbitrary time-point sampling에서는 이 비용이 반복적으로 발생해 병목이 됨.

    - id: motivation_core_contribution
      title: 'Core Idea of NSF'
      body: |
          Neural Stochastic Flow는 SDE의 weak solution을 conditional distribution으로 직접 학습함.
          Drift와 diffusion field를 적분하지 않고 $p(x_t | x_s)$ 자체를 normalising flow로 모델링함.
          한 번의 Gaussian noise sampling과 bijective transformation으로 임의 시간 전이를 생성함.
          논문은 solver-free training과 solver-free inference가 모두 가능한 general Itô SDE 모델을 제안함.

    - id: background_sde_transition_laws
      title: 'SDE Transition Laws'
      body: |
          논문은 Itô SDE를 Eq. (1)의 drift와 diffusion을 갖는 확률 동역학으로 설정함.
          관심 대상은 trajectory path 자체보다 조건부분포 $p(x_t | x_s)$임.
          이 분포는 uncertainty quantification과 probabilistic forecasting의 핵심 객체임.
          Numerical solver 기반 접근은 이 분포를 암시적으로만 다루며 계산 비용이 시간 간격에 의존함.

    - id: background_stochastic_flow_properties
      title: 'Stochastic Flow Properties'
      body: |
          Stochastic flow는 SDE strong solution을 시간 의존 mapping family로 해석함.
          이 mapping은 diffeomorphism, independence, flow property, identity property를 만족함.
          Autonomous SDE에서는 시작 시점을 이동해도 전이분포가 변하지 않는 stationarity도 성립함.
          NSF는 strong solution의 path mapping 대신 weak solution의 조건부분포가 이 성질들을 따르도록 설계함.

    - id: background_position_against_related_work
      title: 'Position Against Related Work'
      body: |
          Neural ODE는 일반 ODE를 다루지만 training과 inference 모두 solver가 필요함.
          Neural flow는 ODE solution map을 직접 학습하지만 stochastic dynamics를 표현하지 못함.
          Diffusion acceleration 계열은 solver-free일 수 있으나 prescribed diffusion process에 특화됨.
          NSF는 general Itô SDE를 대상으로 solver-free training과 inference를 모두 제공하는 위치에 있음.

    - id: method_weak_solution_view
      title: 'Weak Solution as Conditional Flow'
      body: |
          논문은 stochastic flow의 무한차원 Brownian path를 직접 모델링하지 않음.
          Eq. (2)는 strong solution flow를 적분하면 조건부분포가 얻어진다는 관계를 제시함.
          NSF는 이 조건부분포를 $p_\theta(x_{t_j} | x_{t_i}; t_i, t_j - t_i)$로 근사함.
          Gaussian noise를 conditional normalising flow에 통과시켜 SDE weak solution을 표현함.

    - id: method_conditional_normalising_flow
      title: 'Conditional Normalising Flow Design'
      body: |
          Conditioning variable은 현재 상태 $x_{t_i}$, 시간 간격 $\Delta t$, 필요 시 절대시간 $t_i$로 구성됨.
          초기 Gaussian 변환은 Euler-Maruyama 형태와 유사하게 drift는 $\Delta t$, diffusion은 $\sqrt{\Delta t}$로 scaling함.
          이후 여러 affine coupling layer를 적용해 expressive한 bijective transformation을 구성함.
          Bijective 구조 때문에 transition log-density를 closed form으로 계산할 수 있음.

    - id: method_architectural_constraints
      title: 'Built-In Flow Constraints'
      body: |
          Coupling layer의 scale과 shift 항에 명시적으로 $\Delta t$ factor를 곱함.
          $\Delta t = 0$일 때 모든 transformation이 identity가 되도록 설계됨.
          현재 상태에 조건부로 독립적인 noise를 사용해 transition 간 independence를 반영함.
          Autonomous SDE에서는 conditioning에서 절대시간을 제거해 stationarity를 보장함.

    - id: method_flow_consistency_loss
      title: 'Chapman-Kolmogorov Regularisation'
      body: |
          Flow property는 한 번에 가는 전이와 중간 시점을 거치는 전이가 같은 분포를 가져야 함을 의미함.
          논문은 이를 Chapman-Kolmogorov equation 형태의 consistency 조건으로 둠.
          직접 KL 계산은 중간 상태 marginalisation 때문에 intractable함.
          Bridge distribution $b_\xi(x_{t_j} | x_{t_i}, x_{t_k})$를 도입해 양방향 KL upper bound를 최적화함.

    - id: method_training_objective
      title: 'NSF Training Objective'
      body: |
          기본 supervised objective는 transition pair에 대한 negative log-likelihood임.
          여기에 flow consistency loss $L_{flow}$를 더해 self-consistent transition law를 유도함.
          전체 손실은 Eq. (11)의 NLL과 $\lambda L_{flow}$ 조합으로 정의됨.
          Algorithm 1은 bridge parameter와 NSF parameter를 번갈아 업데이트하는 절차를 요약함.

    - id: latent_problem_setting
      title: 'Partially Observed Time Series'
      body: |
          실제 irregular sequence에서는 전체 system state가 관측되지 않는 경우가 많음.
          관측값 $o_{t_i}$는 noisy measurement이고 latent state $x_{t_i}$가 숨겨져 있다고 가정함.
          Latent NSF는 variational state-space model 안에서 transition kernel을 NSF로 대체함.
          목표는 continuous-time latent dynamics를 solver 없이 학습하는 것임.

    - id: latent_vssm_with_nsf_transitions
      title: 'NSF as Latent Transition Kernel'
      body: |
          Generative model은 initial latent state, NSF transition, emission model로 factorise됨.
          Transition $p_\theta(x_{t_i} | x_{t_{i-1}}; t_{i-1}, \Delta t_i)$가 임의 시간 간격을 직접 처리함.
          Inference model은 GRU encoder로 관측 sequence와 시간 정보를 latent posterior로 변환함.
          Figure 2는 discrete VSSM과 continuous-time Latent NSF의 graphical model 차이를 보여줌.

    - id: latent_skip_kl_objective
      title: 'Skip-Ahead KL for Long Horizons'
      body: |
          표준 beta-NELBO는 인접 시점 transition에만 초점을 둠.
          이 경우 long-term dependency에서 error accumulation이 발생할 수 있음.
          논문은 posterior at future time과 NSF direct prediction 사이의 skip-ahead KL을 추가함.
          NSF는 arbitrary gap transition을 직접 계산하므로 overshooting류 목적을 효율적으로 적용할 수 있음.

    - id: experiments_overview
      title: 'Evaluation Protocol'
      body: |
          실험은 synthetic stochastic Lorenz attractor, CMU Motion Capture, Stochastic Moving MNIST를 포함함.
          비교 대상은 latent SDE, SDE matching, Stable Neural SDE 계열, ARCTA, NCDSSM 등임.
          평가는 task-specific accuracy와 FLOPs 또는 runtime을 함께 측정함.
          논문의 핵심 검증 목표는 solver 기반 SDE와 유사한 정확도를 훨씬 낮은 계산량으로 달성하는지임.

    - id: experiments_lorenz_setup
      title: 'Stochastic Lorenz Attractor Setup'
      body: |
          Lorenz 실험은 chaotic stochastic dynamics를 다루는 synthetic benchmark임.
          논문은 1,024개 training trajectory를 생성하고 여러 neural SDE baseline과 비교함.
          성능은 generated distribution과 true distribution 사이의 KL divergence로 측정함.
          계산 비용은 FLOPs와 batch runtime으로 함께 보고됨.

    - id: experiments_lorenz_results
      title: 'Lorenz Results'
      body: |
          Figure 3에서 NSF sample은 true attractor와 시각적으로 잘 겹치는 반면 일부 solver 기반 방법은 분포가 과도하게 퍼짐.
          Table 2에서 NSF Hpred = 1.0은 t = 1.0에서 KL 0.2 ± 0.6과 53 kFLOPs를 기록함.
          Latent SDE는 같은 t = 1.0에서 KL 1.5 ± 0.5와 3,760 kFLOPs를 보임.
          Appendix 결과 기준 runtime은 Latent SDE가 124-148 ms이고 NSF는 약 0.3 ms로 보고됨.

    - id: experiments_motion_capture_setup
      title: 'CMU Motion Capture Setup'
      body: |
          CMU walking subset은 23개 sequence를 300 time step으로 down-sampling해 사용함.
          Train, validation, test split은 16, 3, 4 sequence로 구성됨.
          Setup 1은 첫 3개 관측으로 나머지 297 step을 예측하는 within-horizon forecasting임.
          Setup 2는 training horizon 밖의 200 step을 예측하는 beyond-horizon extrapolation임.

    - id: experiments_motion_capture_results
      title: 'Motion Capture Results'
      body: |
          Table 3에서 Latent NSF는 Setup 1 MSE 8.62 ± 0.32로 latent SDE 계열과 유사한 범위의 성능을 보임.
          Setup 2에서는 MSE 3.41 ± 0.27로 표에 제시된 baseline 중 가장 낮은 값을 보임.
          Figure 4는 Latent NSF가 accuracy-runtime trade-off에서 latent SDE보다 유리함을 보여줌.
          논문은 Latent NSF runtime이 약 3.5 ms이고 latent SDE가 약 75 ms라고 보고함.

    - id: experiments_moving_mnist_results
      title: 'Stochastic Moving MNIST Results'
      body: |
          Stochastic Moving MNIST는 64x64 frame에서 두 digit의 stochastic bouncing dynamics를 모델링함.
          Table 4에서 Latent NSF one-step은 Static FD 1.67 ± 0.47로 latent SDE의 2.66 ± 0.87보다 낮음.
          Frame-wise FD는 Latent NSF one-step과 recursive 모두 0.63 수준으로 latent SDE 0.58과 유사함.
          Full-sequence prediction runtime은 latent SDE 751 ms, Latent NSF one-step 358 ms로 보고됨.

    - id: discussion_main_takeaways
      title: 'Main Takeaways'
      body: |
          NSF는 vector field를 학습해 solver로 적분하는 대신 transition distribution을 직접 학습함.
          Conditional normalising flow 설계로 closed-form density와 one-step arbitrary-time sampling을 제공함.
          Flow consistency regularisation은 서로 다른 step decomposition 간 self-consistency를 유도함.
          실험 전반에서 solver 기반 방법과 경쟁 가능한 정확도와 큰 계산량 절감을 함께 보임.

    - id: discussion_limitations
      title: 'Limitations'
      body: |
          Chapman-Kolmogorov consistency는 variational bound로 근사적으로만 강제됨.
          Training regime 밖에서는 flow inconsistency가 발생할 수 있어 held-out flow loss monitoring이 필요함.
          Maximum one-shot horizon 선택은 효율성과 예측 정확도 사이의 trade-off를 가짐.
          Affine coupling 구조는 analytical Jacobian을 보장하지만 architecture expressivity에 제약을 줄 수 있음.

    - id: discussion_future_directions
      title: 'Future Directions'
      body: |
          논문은 action-conditioned NSF가 model predictive control과 reinforcement learning에 연결될 수 있다고 제안함.
          Diffusion model과 NSF를 결합하면 continuous-time modelling에서 상호 보완적 장점을 활용할 수 있음.
          TarFlow 같은 transformer-based flow는 coupling 구조의 제약을 완화할 가능성이 있음.
          빠른 analytical transition은 trading, robotics, digital twin 같은 실시간 stochastic modelling에 적합해 보임.
